<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - CineEstreia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>🎬 CineEstreia</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="index.html#estreias">Em Estreia</a></li>
                    <li><a href="index.html#filmes">Filmes</a></li>
                    <li><a href="#contato" class="active">Contato</a></li>
                </ul>
            </nav>
            <button class="btn-login">Login</button>
        </div>
    </header>

    <main>
        <section class="contato-section">
            <div class="container">
                <h2>Fale Conosco</h2>
                <p class="subtitle">Adorariamos ouvir sua opinião sobre nossos filmes!</p>
                
                <form id="contato-form" class="contato-form">
                    <div class="form-group">
                        <input type="text" id="nome" placeholder="Nome completo" required>
                    </div>
                    <div class="form-group">
                        <input type="email" id="email" placeholder="E-mail" required>
                    </div>
                    <div class="form-group">
                        <textarea id="mensagem" placeholder="Sua mensagem..." rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Enviar Mensagem</button>
                </form>
                
                <div id="sucesso" class="mensagem-sucesso" style="display: none;">
                    <p>✅ Mensagem enviada com sucesso! Em breve entraremos em contato.</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 CineEstreia. O melhor do cinema está aqui. <strong>✨ Viva a magia do cinema!</strong></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
